# 跨资产默认参数（模板）
# 复制为 config/analysis_defaults.yaml 后在本地按需修改。

# 写入 PostgreSQL journal_ideas 前的最小盈亏比（与 CryptoTradeDesk 口径一致：|TP1-entry|/|entry-stop|）
min_journal_rr: 1.2

# 可选质量门：enabled 为 false 时仅 RR 门槛生效（默认保守关闭）
journal_quality:
  enabled: false
  skip_structure_flags: []
  require_mtf_align_for_crypto_only: false
  swing_journal_enabled: true
  swing_min_bars: 55
  swing_require_wyckoff_aligned: false

journal_action_thresholds:
  worth_doing_rr: 1.45
  observe_rr: 1.2

# 均线系统（按资产板块）
ma_system:
  crypto:
    short: 8
    mid: 21
    long: 55
  equity:
    short: 13
    mid: 34
    long: 89
  gold:
    short: 13
    mid: 34
    long: 89
  default:
    short: 20
    mid: 60
    long: 120

# 分形/结构参数（预留）
pivot_left: 2
pivot_right: 2
pivot_long_lookback_bars: 400
pivot_merge_rel: 0.001
pivot_touch_rel: 0.001
pivot_mtf_match_rel: 0.004

# 1-2-3 规则集标识
method_123_ruleset_id: ross_123_reversal_fractal_v1

# 通用 LLM 提供商配置（统一 agent 主模型入口）
# 说明：
# 1) 默认仍使用 DeepSeek
# 2) 后续可将 default_provider 切到 openai / openrouter / 其他 OpenAI-compatible 平台
# 3) 当前统一 LLM 入口只读取本块
llm:
  default_provider: "deepseek"
  providers:
    deepseek:
      env_prefix: "DEEPSEEK"
      base_url: "https://api.deepseek.com"
      model: "deepseek-v4-flash"
      openai_compatible: true
      api_key: "替换为你自己的api key"
    openai:
      env_prefix: "OPENAI"
      base_url: "https://api.openai.com/v1"
      model: "gpt-4.1-mini"
      openai_compatible: true
      api_key: "替换为你自己的api key"
    openrouter:
      env_prefix: "OPENROUTER"
      base_url: "https://openrouter.ai/api/v1"
      model: "openai/gpt-4.1-mini"
      openai_compatible: true
      api_key: "替换为你自己的api key"

# 飞书机器人（模板）
# 注：default_symbol / default_interval / short_term_interval 已迁移到 runtime route context，
# 由 session_state + market_config + router_policy 常量在运行时决定，不再作为配置字段。
feishu:
  app_id: "替换为你自己的app id"
  app_secret: "替换为你自己的app secret"
  memory:
    enabled: true
    backend: "jsonl" # A 阶段先用 jsonl，后续可升级 sqlite/vector
    memory_file: "output/feishu_memory.jsonl"
    max_messages_per_user: 2000
    history_days: 30
    long_term_top_k: 3
  llm_memory_rounds: 4 # 传给路由模型的最近对话轮数（1轮=用户+机器人）
  # 路由仍走 tools/llm/client.py 的 tool-calling 客户端（provider-agnostic）；当前默认使用 llm.providers.deepseek，勿要求模型输出裸 JSON。留空则用代码内默认。
  llm_router_system_prompt: ""
  llm_router_temperature: 0.0
  # 为 true 时，飞书回复会调用当前 grounded/narrative writer 生成口语化长文；默认模型仍来自 llm.providers.deepseek。失败则回退固定模板。也可用环境变量 FEISHU_USE_NARRATIVE_REPLY=1
  use_narrative_reply: false
  narrative_temperature: 0.35
  # 可选：覆盖默认叙事 system 提示；留空则用 tools/llm/client.py 内建默认提示
  narrative_system_prompt: ""

agent:
  enable_grounded_writer: true
  writer_model: ""
  writer_temperature: 0.3
  writer_system_prompt: ""
  enable_quote_mode: true
  enable_compare_mode: true
  enable_research_mode: true
  fallback_to_template_reply: true

# 纸交易头寸：按 market 映射币种账本；qty = (balance * max_loss_pct) / |entry - stop|
# CN/A 股与贵金属(PM)走 CNY；美股与加密货币(CRYPTO)走 USD；HK 默认 USD；未知 market 默认 USD。
# 多币种账户：initial_balance / balance 供头寸公式；`alembic upgrade head` 的 journal_004 会按本块为 PG account_ledger 写入首条 reason=init（仅当该币种尚无账本行）
accounts:
  CNY:
    balance: 500000
    max_loss_pct: 0.02
    qty_step: 0.0001
  USD:
    balance: 100000
    max_loss_pct: 0.02
    qty_step: 0.0001

# 账户账本（能连 PG 时写 account_ledger；无引擎时为 no-op）
account_system:
  auto_sync_to_journal_ideas: true
  mark_to_market_interval_seconds: 3600
  simulation_mode: true
  fee_bps: 0

# 台账与纸交易：PostgreSQL（需 database.postgres.dsn）
database:
  postgres:
    dsn: "postgresql+psycopg://stock_user:stock_pass@127.0.0.1:5432/stock_analysis"
    pool_size: 5
    max_overflow: 10
    pool_pre_ping: true
    pool_recycle: 1800
    echo: false
