# 跨资产默认参数
# 写入 trade_journal.jsonl 前的最小盈亏比（与 CryptoTradeDesk 口径一致：|TP1-entry|/|entry-stop|）
min_journal_rr: 1.2
# 可选质量门：enabled 为 false 时仅 RR 门槛生效（默认保守关闭）
journal_quality:
  enabled: false
  skip_structure_flags: []
  require_mtf_align_for_crypto_only: false
  swing_journal_enabled: true
  swing_min_bars: 55
  swing_require_wyckoff_aligned: false
journal_action_thresholds:
  worth_doing_rr: 1.45
  observe_rr: 1.2

# 均线系统（按资产板块）
# 参考常见技术分析口径：
# - 虚拟货币：8/21/55（更强调交易节奏）
# - 股票：13/34/89（中长趋势常用）
# - 黄金：13/34/89（与大宗商品趋势口径一致）
ma_system:
  crypto:
    short: 8
    mid: 21
    long: 55
  equity:
    short: 13
    mid: 34
    long: 89
  gold:
    short: 13
    mid: 34
    long: 89
  default:
    short: 20
    mid: 60
    long: 120

# 分形/结构参数（预留）
pivot_left: 2
pivot_right: 2
pivot_long_lookback_bars: 400
pivot_merge_rel: 0.001
pivot_touch_rel: 0.001
pivot_mtf_match_rel: 0.004

# 1-2-3 规则集标识
method_123_ruleset_id: ross_123_reversal_fractal_v1
